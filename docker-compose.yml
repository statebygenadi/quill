services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quill
      POSTGRES_PASSWORD: quill
      POSTGRES_DB: quill
    ports:
      - "5432:5432"
    volumes:
      - quill_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quill"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  quill_pg:
